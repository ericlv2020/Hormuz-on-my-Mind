<script>
const DATA = {
  nd1:{tag:'No Deal',bg:'#FAC8C8',tc:'#8B1C1C',title:'Regional Power Shifts',body:'A U.S. withdrawal without meaningful agreement triggers immediate reassessment across the region. Countries that have been hedging — Saudi Arabia, UAE, Qatar, Turkey — will accelerate moves toward alternative security frameworks. The vacuum does not stay empty. China and Russia fill it.\n\nThis follows the same pattern as every previous U.S. disengagement without a political settlement. The difference here is the proximity to nuclear capability and the density of proxy networks. The regional consequences are not delayed — they begin the day the talks collapse.'},
  nd2:{tag:'No Deal',bg:'#FAC8C8',tc:'#8B1C1C',title:'Global Realignment',body:'Beyond the region, a failed diplomatic exit signals systemic weakness in the Western-led multilateral framework. Allies in Asia, Europe, and Africa independently recalibrate their security calculus. The credibility cost is not regional — it is global.\n\nEvery alliance commitment becomes marginally less credible. Every adversary becomes marginally more emboldened. Countries do not announce recalibrations — they quietly accelerate defence spending, hedge currency reserves, and sign memoranda of understanding with counterparts they previously kept at arm\'s length.'},
  nd3:{tag:'No Deal',bg:'#FAC8C8',tc:'#8B1C1C',title:'The Mowing the Lawn Problem',body:'The phrase normalises strategic failure as tactical necessity. Periodic military action to suppress — not resolve — threats becomes the default posture. Each cycle costs lives, credibility, and political capital. Each cycle is presented domestically as a success.\n\nThe regional and humanitarian consequences are systematically obscured by the language. Infrastructure degradation, supply chain disruption, and displacement compound with each cycle. The lawn grows back. It always does — because the conditions that produced the threat are never addressed.'},
  softd1:{tag:'Soft Deal',bg:'#F5E090',tc:'#6B3D00',title:'Counterpart Authority',body:'A deal is only as durable as the authority of those who sign it. If the Iranian signatory lacks command over the IRGC, the parallel nuclear programme, or domestic hardliners, any agreement is provisional at best.\n\nYou need the people who actually control the capability at the table — or close enough to it that the signature carries operational weight. A Foreign Ministry agreement without Supreme Leader mandate and IRGC compliance is a formality. The JCPOA ran into exactly this: the programme continued in areas the deal did not formally cover, because the people who controlled those areas were not bound by what was signed.'},
  softd2:{tag:'Soft Deal',bg:'#F5E090',tc:'#6B3D00',title:'The Perception Gap',body:'A deal framed as a political victory in Washington may be read very differently in Brussels, Riyadh, Jerusalem, or Beijing. If allies, adversaries, and markets collectively assess it as cosmetic, the diplomatic capital spent is wasted and the deterrent signal is undermined.\n\nPerception is reality in arms control. A deal nobody believes in does not deter. It may in fact do the opposite — signalling that the red lines announced before negotiation were not in fact red lines, and that further provocation will be met with further negotiation rather than consequence.'},
  softd3:{tag:'Soft Deal',bg:'#F5E090',tc:'#6B3D00',title:'Deferred, Not Resolved',body:'A soft deal extends the timeline before the next crisis. It does not remove the underlying threat architecture: enriched stockpiles, missile capability, proxy networks, and ideological commitment to the programme remain intact.\n\nThe question is not whether conflict comes — it is whether the deal buys enough time to build a better solution, or just enough time to forget the problem. History suggests the latter. The conditions for renewed escalation persist. The gap between crises closes. And the next negotiation begins from a weaker position, with less credibility and less leverage than the last.'},
  hd1:{tag:'Hard Deal',bg:'#A0E0D4',tc:'#073D36',title:'The Foundational Requirement',body:'The single most important variable in a Hard Deal is not the text — it is the counterpart. You need a signatory with genuine executive authority over the IRGC and the nuclear programme.\n\nThis requires an Iranian political moment where the decision to deal is made at the top, not delegated down. Without this, the deal exists on paper. The infrastructure that makes Iran a strategic concern — the centrifuges, the missiles, the proxies — remains under command of people who did not agree to anything.'},
  hd2:{tag:'Hard Deal',bg:'#A0E0D4',tc:'#073D36',title:'What Credible Enforcement Requires',body:'Continuous, intrusive, non-negotiable IAEA access — including military sites. Any-time, any-place inspection rights not subject to Iranian consent on a case-by-case basis. Physical removal of enriched uranium stockpiles, not capping. Automatic snapback mechanisms that cannot be vetoed at the Security Council.\n\nThe JCPOA had the architecture but not the teeth. A Hard Deal needs both. Without enforcement, it is a Soft Deal with better marketing. The breakout timeline calculation is only meaningful if the fissile material is physically outside the country and the centrifuge production lines are genuinely constrained — not paused, not monitored, constrained.'},
  hd3:{tag:'Hard Deal',bg:'#A0E0D4',tc:'#073D36',title:'Both Tracks, Not One',body:'Constraining enrichment without addressing missile delivery architecture leaves the threat partially intact. You have removed the warhead but left the launch system. A truly hard deal covers both tracks: uranium enrichment limits with physical material removal, and meaningful constraints on ballistic missile development.\n\nCovering only the nuclear track is the diplomatic equivalent of removing the bullet but leaving the gun — and the ammunition factory, and the training programme. Allies in the region will not accept a deal that neutralises the nuclear track while leaving the missile programme unconstrained. Their calculus is correct.'},
  se1:{tag:'Seismic Event',bg:'#CEBAFC',tc:'#280E60',title:'The Risk Architecture',body:'Internal upheaval leading to fundamental change in Iran\'s governing structure is the highest-stakes outcome on the board. The probability of miscalculation, escalation, and humanitarian cost is substantial. The 2–3 week window often referenced in strategic analysis is almost certainly insufficient for a transition of this magnitude.\n\nTransitions of this complexity typically take months to years. The interim period — when the old order is gone but the new one is not yet established — is where the greatest danger lies. Proxy forces do not stand down because the government changed. Nuclear material does not secure itself. External actors who benefit from instability will not wait passively.'},
  se2:{tag:'Seismic Event',bg:'#CEBAFC',tc:'#280E60',title:'The Coalition Requirement',body:'A transition of this magnitude cannot be managed unilaterally. It requires coordinated international legitimacy: diplomatic recognition of successor authority, economic frameworks to prevent collapse, and security arrangements to fill the vacuum before proxies or regional powers move to fill it themselves.\n\nThe 2003 error was treating removal and successful transition as the same problem. They are not. Removing a government takes days. Building a successor state takes years. The morning after is where the real work begins — and where international support either arrives in time or does not.'},
  se3:{tag:'Seismic Event',bg:'#CEBAFC',tc:'#280E60',title:'The Long-Term Stakes',body:'If achieved on stable terms — a large conditional — this outcome would represent a generational shift in the regional and global security architecture. The comparison to post-Cold War realignment is not hyperbolic: energy markets, alliance structures, nuclear non-proliferation dynamics, and the strategic balance across the Middle East and beyond would all be materially affected.\n\nThis is why it carries the highest risk and the highest potential reward simultaneously. The temptation is to pursue it without adequate preparation for the transition phase. That is where the scenario most commonly fails — not in the rupture, but in the aftermath.'}
};

function showModal(key){
  const d=DATA[key];
  const tag=document.getElementById('mTag');
  tag.textContent=d.tag; tag.style.background=d.bg; tag.style.color=d.tc;
  document.getElementById('mTitle').textContent=d.title;
  const body=document.getElementById('mBody');
  body.innerHTML='';
  d.body.split('\n\n').forEach(p=>{
    const el=document.createElement('p'); el.textContent=p; body.appendChild(el);
  });
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function handleOverlay(e){ if(e.target===document.getElementById('overlay')) closeModal(); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
</script>
